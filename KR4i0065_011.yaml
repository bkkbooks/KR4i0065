body:
  text: 曹尸鳩曹叔為政有度國人美之而作是詩興也下泉東遷之初曹人閔周而作皆比而後賦也蜉蝣君怠國危曹大夫閔之而作皆比而賦也候人曹君多任非人國人諷之首章賦也後三章比也
