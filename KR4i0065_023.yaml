body:
  text: 頌閔豫小子成王免喪始朝先王之廟作詩四篇以自警皆賦也訪落成王既朝于廟因作此詩以道延訪群臣之意賦也敬之成王受群臣之戒而述其言賦也毖亦訪落之意賦也載見此諸侯助祭于武王廟之詩賦也有客成王既討武庚封微子啓于宋來朝于周見於祖廟此其燕樂之歌賦也有瞽始作樂而合乎祖之詩賦也潛薦魚于寢廟之樂歌賦也絲衣士執事於王祭而飲以旅酬之樂歌賦也臣工祭先農之詩賦也豐年秋冬報賽之樂歌蓋祀田祖先農方社之屬賦也載芟亦豐年之意賦也良耜與載芟同意賦也昊天有成命康王禘成王于明堂之詩賦也噫嘻康王孟春祈穀于東郊以成王配享之詩賦也執競昭王禘康王于明堂之詩賦也
