body:
  text: 商頌那祀成湯之樂歌賦也烈祖與上篇同長發大禘之詩賦也玄鳥此亦禘祀之詩賦也殷武祀高宗之樂蓋帝乙之世武丁親盡當祧以其中興功高存而不毀特新其廟稱為高宗而祀之故作此歌賦也
