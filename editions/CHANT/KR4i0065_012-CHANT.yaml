body:
  text: 鄶羔求鄶君不能自強于政治國人憂之而作賦也匪風周室衰微賢人憂嘆而作賦也萇楚鄶人困於賦役而作賦也素冠三年之喪廢君子傷之而作賦也𣉠之水兄弟為人所間而被讒者訴之詞比而賦也大路棄婦之詞賦也
