body:
  text: 鄭緇衣鄭武公好賢賦詩貽之賦也將仲子鄭莊公欲陷弟段授以大邑祭仲諫陽拒之大夫原其情而刺之皆賦中有比也尗于田尗段多才而好勇大夫憂之而作是詩賦也大尗段不義而得眾大夫憂之而作是詩賦也有女同車鄭世子忽辭昏于齊祭仲足諫之而作是詩賦也籜兮鄭莊公卒公子爭立而齊楚交伐忠臣憂之欲相率獻謀以救其國故作此詩皆先比而後賦也清人鄭文公惡其大夫高克欲遠之而使禦狄于境久而不召師將潰散公子素憂之而作是詩賦也扶胥鄭靈公棄其世臣而任嬖人狂狡子良諫之而作是詩興也麥秀靈公不聽子良之諫將逐之故作是詩以責狂狡一章興也二章賦也褰裳子良如晉作詩以寓靈公賦也溱洧刺亂也皆賦體羔求鄭子皮卒子產思之追頌焉賦也女曰雞鳴夫婦相警戒之詞賦也出其東門鄭之貞士宜其室家不染淫俗而作此詩賦也
