body:
  text: 鄘牆有茨鄘人刺三監之詩興也相鼠刺三尗之詩興也伯兮鄘人有從武庚而伐衛者室家憂而作一章二章賦也三章比而後賦也四章賦也考槃美隱者之詩賦也木瓜朋友相贈之詩賦也芄蘭刺霍叔也以童子僭成人之服比其不度德量力而助武庚作亂有狐君子于寒夜見貧民與狐涉水而傷之賦也氓淫婦為人所棄鄘人述其事以刺之首二章皆賦也三四章皆興也五章賦也六章賦中有比也
