body:
  text: 秦無衣秦襄公以王命征戎周人赴之賦也小戎秦襄公征戎而勞其大夫之詩賦也車鄰襄公初為諸侯周大夫與燕美之而作首章賦也下二章比也終南襄公初為諸侯秦人祝之而作興也駟鐵秦人從狩而作賦也渭陽晉公子重耳歸于晉秦穆公送之而作是詩賦也黃鳥秦穆公卒世子罃以三良殉之秦人傷之而作是詩興也蒹葭君子隱于河上秦人慕之而作是詩興而比也晨風秦君遇賢始勤終怠賢人譏之興也權輿與前篇同義賦也
