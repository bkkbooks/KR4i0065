body:
  text: 邶柏舟康尗因管尗欲害周公挾武庚以叛憂之而作一章興也下四章皆賦也雄雉邶之臣諫管尗而作此一章二章皆興也三章四章皆賦也匏有苦葉邶人刺管尗之詩一章比也二章興而比也三章四章全比也北門邶之仕者處危國事亂君因征役而出門賦之以自嘆也東兮伶官心乎王室而自傷之詩前三章賦也末章興也北風邶人厭亂之詩皆比而賦也谷風邶之良婦見棄於夫而作是詩一章比中有賦也二章賦也三章比而賦也四章比而後賦也五章六章皆賦也凱風邶人母不安其室七子自咎而作一章二章比而賦也三章四章皆興也靜女陳古諷今之詩賦也
