body:
  text: 小雅鹿鳴天子燕賓師之歌蓋鹿鳴伐木菁莪隰桑皆燕賢者而詞有重輕敬有隆殺所謂尊賢之等也三章皆以鹿鳴起興而賦之伐木天子燕友之歌興也青莪天子燕賓興之士則歌此詩比而賦也隰桑天子燕士之詩前三章比而賦也末章賦也白駒賢者將隱去王者留之而作是詩賦也常棣天子燕兄弟之歌首章興也二章賦也三章至末皆賦也頍辨此燕王族之詩賦中有比也嘉魚此前二章皆賦也後二章先比而後賦也魚麗此詩全篇皆賦也瓠葉全篇皆賦也南山有薹大臣頌美天子之詩興也天保大臣祝頌天子之詩賦也煌華天子遣使于四方歌此餞之首章興也下四章皆賦也四牡天子勞使臣之詩首二章皆賦也三章四章皆興也末章賦也杕杜勞還戍之詩前三章皆興也末章賦也邠風周公陳農政之詩賦也南山王者勸農而禱祀之詩賦也楚茨農事既成乃祭宗廟燕及王族之詩賦也甫田農事既成祀田祖而并犒農夫之詩賦也大田農夫報上之詩賦也斯干王者落其新宮史佚美之賦也鴻鴈王者柔懷遠人流民喜之而作是詩比而賦也蓼蕭諸侯來朝天子燕之而歌此詩興也常常者華天子美諸侯之詩前三章興也末章賦也湛露天子燕同姓諸侯之詩興也彤弓諸侯敵愾獻功天子賜弓矢燕之而奏樂歌賦也桑鳸天子燕方伯之詩前二章皆興也二章皆賦也采叔諸侯免喪入朝天子錫賚之詩前二章皆興也中一章賦也末章皆興也瞻彼洛矣天子會武于洛邑諸侯美之賦也鴛鴦諸侯祝天子之詩興也魚藻亦諸侯美天子之詩興也
