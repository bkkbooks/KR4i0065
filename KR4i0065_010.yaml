body:
  text: 唐蟋蟀唐人相戒之詩興也山有樞唐人憂國之詩興也茮唐昭侯封公子成師于曲沃成師治聚盛強師服憂之而作是詩比中有賦也𣉠之水成師有篡國之謀唐人知之而作是詩比而後賦也無衣唐公孫偁弒三君而取其國盡以寶器賂周僖王王命之為晉侯國人作此以刺之賦也葛生晉獻公之時國人久于征役室家念之而作是詩二章興也後三章賦也采苓晉人諫獻公信讒之詩賦也杕杜晉文公好賢而國人美之興也野有蔓草晉臼季薦郤缺于文公晉人美之比也羔求晉人美其大夫之詩興也彼汾晉人刺其大夫之詩興也綢繆晉亂民窮昏婣失時君子傷之而作是詩興也
