body:
  text: 陳宛丘陳人譏其大夫之詩賦也衡門君子樂隱之詩賦也株林陳靈公通乎夏姬國人刺之賦也墓門泄冶諫靈公孔寧儀行父譖而囚之冶作是詩興也防有鵲巢泄冶被讒內子憂之而作比而後賦也澤陂泄冶諫而死君子傷之興也東門之枌東門之池東門之楊月出朋友相期不至而作興也
