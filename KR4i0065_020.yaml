body:
  text: 大雅續雲漢宣王憂旱史籀美之賦也崧高宣王之舅申伯出封于謝尹吉甫詩以送之賦也烝民宣王命樊侯築城于齊尹吉甫詩以送之賦也韓奕韓侯來朝受命將歸顯父餞之贈以是詩六章皆賦也江漢召穆公帥師征淮南之夷史籀美之而作是詩賦也常武宣王親征淮北之夷既服而歸召穆公美之賦也
