body:
  text: 衛柏舟衛釐侯在位世子恭伯先卒恭薑守義齊武公欲召之歸寧而嫁之恭薑不許故作此詩興也淇奧美衛武公之詩興也干旄美武公好賢賦也碩人衛莊公娶于齊曰莊薑賢而公不禮焉國人閔之而作是詩前一章賦也二章賦而比也三章賦也四章興也緑衣衛莊公嬖人生州吁有寵而好兵莊薑憂之而作前二章皆賦也三與四皆比而賦也終風莊薑戒州吁公不悅薑憂而作詩四章皆比而後賦也日月州吁弒桓公莊薑大歸而作是詩賦也燕燕莊薑與娣戴媯皆為州吁所逐同出衛野而別莊薑作詩以贈媯焉前三章皆興也後一章賦也擊鼓州吁伐鄭國人怨之而作賦也親臺衛宣公為伋娶婦而美築親臺而自納之衛人惡之而賦其事也末章比中有賦也二子乘舟宣公欲立少子朔使伋壽如齊而沉之于河衛人傷之而作是詩賦也君子偕老刺宣薑之詩賦也鶉之奔奔刺宣薑與公子頑之詩興也采唐宣薑召公子頑于公桑久處而遠送之國人刺之而作是詩興也載馳許穆夫人閔衛之亡傷許之小力不能救恩歸唁其兄義又不得故賦是詩前二章皆賦也三章四章皆興也泉水宋桓夫人閔衛之破而作首興後皆賦也竹竿宋桓夫人之媵和泉水而作首章興也二章三章先比後賦也河廣宋桓夫人生襄公而出歸于衛襄公即位夫人思之而義不可往故作此詩賦也旄丘狄逐黎侯黎侯寓于衛衛穆公不克納黎大夫怨之而作是詩一章興也二章三章四章賦也式微黎侯失國而寓于衛其臣勸之歸賦也蝃蝀衛靈公為南子召宋朝國人譏之二章皆先比而後賦也末章賦也
