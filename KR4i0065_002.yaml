body:
  text: 召南鵲巢諸侯嫁女其民觀焉即其事而賦之也采蘩美夫人親蠶之詩賦也江有汜諸侯之媵始不容於嫡終而進之故作是詩興也羔羊美大夫之詩賦也采蘋內子敬祀詩人賦之殷其靁武王克商諸侯受命于周廟出就終南之館故作此詩皆比而後賦也草蟲南國大夫夏聘于周次于終南睹王室之多賢相率以歸心焉賦也小星小臣奉使行役之詩賦也鄒虞美虞人之詩賦也摽有梅女父擇壻之詩興也野麋昏姻惡無禮之詩賦也行露強委禽而不受至於興訟大夫以禮斷之而國史美之一章比也二章三章皆興也甘棠燕人追美召公之詩賦也
