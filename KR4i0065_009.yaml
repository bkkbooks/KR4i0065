body:
  text: 魏伐檀君子能其宦而不用魏人慕之而作是詩比而興也十畝之間政亂國危賢者不樂仕于其朝而思與友歸於農畝賦也杕杜君子教人孝友之詩興也陟岵魏人行役而思其親故作此詩賦也園有桃君子憂國而歎之故作詩賦也碩鼠大夫貪戾魏人怨之而作是詩比而後賦也鴇羽民從征役而不得養其父母故作此詩興也葛履魏之內子儉不中禮媵者怨之一章興也二章賦也
