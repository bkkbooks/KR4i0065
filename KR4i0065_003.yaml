body:
  text: 魯鴟梟管叔及其群弟流言于國周公避居于魯殷王祿父遂與十七國作亂周公憂之作此詩以貽成王欲王省悟以備殷全篇以鳥之育子成巢者比先王之創業而代之為言也東山周公伐武庚既克而歸勞其從行之士故作此詩皆賦中有興焉狼跋周公居于魯魯人睹其德容而作是詩先比而後賦也伐柯管叔以殷圍衛大夫議迎周公乃作此詩一章全比也二章比而賦也九罭周公歸于周魯人欲留之不可得作是詩興也破斧周公至自征殷四國美之賦也僖公城楚丘以備戎太史克美之賦也駉史克美僖公考牧之詩賦也泮宮僖公作泮宮而落其成太史克頌禱之調前三章皆賦其事以起興也下四章皆賦也有駜燕飲而頌禱之詞興也閟宮魯僖公新作后稷文王之廟于太廟世室及孝惠桓莊四親廟之上而史克作詩以頌之非孔子所録也十一章皆賦也
