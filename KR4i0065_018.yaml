body:
  text: 小雅傳鼓鐘昭王南游宴樂于淮水之上君子憂傷而作是詩賦也圻招穆王西征七萃之士咸怨祭公謀父作此詩以諷諫賦也北山大夫行役不得以養其父母而作是詩賦也緜蠻大夫失位遠適它國其過賓之主人閔之而作是詩興也青蠅厲王之世讒言繁興君子憂之而作興也小東東國困于役而傷于財大夫作此以告病首章賦中有比也次章賦也三章興也後四章皆賦也菀柳厲王暴虐諸侯相戒而作興也小明厲王流於彘大夫之從行者歷時既久悲傷而作皆賦也小弁尹伯奇為後母所譖而出其鄰大夫作此詩以諷其父吉甫首章至第五章皆興也六章興也七章賦中有興也八章興也巷伯幽王之時孟子遭讒而被宮刑為寺人而作此詩前六章皆賦也末章先比而後賦也巧言周幽王時大夫傷于讒而作是詩前三章皆賦也四章興而比也五章興也下章皆賦也小旻大夫以王惑于邪謀不能斷以從善而作此詩賦也鳴鳩此大夫遭周之亂而兄弟相戒以免禍之詩首章興也二章賦也此下三章皆興也白華幽王寵褒姒廢姜后后歸申而作此詩興也角弓王不親九族而好讒佞宗族相怨之詩首章興也下三章皆賦也五章比也下三章皆先比而後賦也十月之交幽王之時天變見於上地變動于下而姦臣亂政于外嬖妾敗德于內大夫憂亂亡之將至故作是詩賦也正月周室喪亂大夫傷之而作是詩前三章皆賦也四五章賦也六章興也七章賦中有比也八章九章皆比也十章先比而後賦也十章十一章皆賦也賓之初筵衛武公自警之詩賦也懿戒衛武公自警兼訓國人首四章皆賦也五章賦中有興也六七章皆賦也八章賦中有比也九章興也至末三章皆賦也四月大夫遭讒流離南國而作是詩前三章皆賦也中三章興也七章賦也末章亦興也蓼莪王室昏亂讒邪肆行其大夫士有沒而不得其所者孝子痛傷而作是詩前三章皆先比而後賦也四章賦也五章六章皆興也雨無其極東遷之初大夫有不忠于王室者御之臣閔之而作賦也節桓王之時任用非人諸侯咸叛兵敗民殘家父憂之作此以諫王焉首二章興也下六章皆賦也谷風朋友相怨之詩興也都人士尹伯封作周既東遷見西周風俗之美而傷今之不古若賦也
