body:
  text: 大雅文王周公追述文王之德明周家所以受命而代商者作詩歌奏於清廟受釐陳戒之時以訓嗣王賦也生民周公制禮作樂尊后稷以配天故作此詩以推本其始命之祥明其受命于天者其原如此賦也公劉周報公劉召公述其事以訓嗣王使知民事之詩賦也綿周報太王周公述其事以訓嗣王之詩首章起句為比下五句皆直賦之也下七章皆賦也棫朴周公詠歌文王之德以訓嗣王首章興也二章賦也三章興也四章五章皆先比而後賦也旱麓詠嘆文王之德前三章皆興也第四章賦也五章末章皆有義之興也思齊歌文王之德而推本言之賦也皇矣詩敘太王太伯王季之德以及文王伐密伐崇之事賦也靈臺文王遷都于豐作靈臺以齊七政奏辟雍周公述之以訓嗣王賦也大明周公述文武受命之功以訓嗣王八章皆賦也文王有聲周公述文武遷都豐鎬以訓嗣王前七章皆賦也末章興也行葦天子祭畢而燕父兄耆老之詩首章興也下三章皆賦也既醉王族與燕畣行葦之詩賦也鳧鷖祭之明日繹公尸之樂歌興也嘉樂公尸美王者之詩賦也泂酌召康公戒成王之詩興也卷阿召康公從成王遊歌於卷阿之上因王之歌作此以進戒首章總敘以發端也二章以下凡五章皆召公陳其歌詠之辭皆賦體七八章皆興也九章即其所見賦之以寓進戒之意第十章承上鳳皇之鳴而賦之以興下章之義高岡卷阿之脊末章賦也大武康王大禘報祀成王奏大武六成既畢受釐陳戒之詩賦也
