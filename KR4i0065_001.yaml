body:
  text: 周南關雎文王之妃太姒思得淑女以充嬪御之職而供祭祀賓客之事故作是詩首章於六義中為先比而後賦也以下二章皆賦其事而寓比興之意葛覃此亦大姒所自作賦也桃夭周人美后妃終始婦道之詩皆比而後賦也螽斯美周室多男之詩興也麟止文王之子多仁賢美之皆比中有賦也卷耳文王遣使求賢而勞之以詩首章先比而後賦也後三章皆賦也兔罝文王聞大顛閎夭散宜生皆賢人而舉之國史詠其事而美之皆比而後賦也樛木諸侯慕文王之德而歸心焉故作此詩皆比而後賦也汝墳商人苦紂之虐歸心文王而作是詩首二章賦也末章興也漢廣文王化行江漢而男女知禮國史美之而作是詩皆比中有賦也芣苢童兒鬭艸嬉戲歌謠之詞賦也
