body:
  text: 小雅續六月尹吉甫帥師征獫狁史籀美之賦也出車宣王再命南仲伐獫狁遂平西戎勞其還師史籀美之賦也采薇宣王之世既驅獫狁勞其還師之詩前四章皆興也下二章皆賦也采芑宣王命方叔征荊荊人來歸史籀美之前三章皆興也末章賦也黍苗宣王命召穆公往城謝以遷申伯史籀美之此章興也下四章皆賦也車工宣王大閲于東都諸侯畢會史籀美之賦也吉日宣王畋獵復古史籀美之賦也庭燎宣王勤政史籀美之賦也沔水宣王即位乞言於群后而作是詩皆興也無羊宣王考牧史籀美之賦也車舝宣王中興士得親迎其友賀之而作此詩首章賦也次章興也三章賦也四章興也
