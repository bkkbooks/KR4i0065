body:
  text: 王黍離幽王伐申申侯逆戰于戲射王弒之立平王于申自申遷洛命秦伯帥師逐犬戎于鎬京尋遣尹伯封犒秦伯之師過故宗廟宮室秦人皆墾為田咸生禾黍旁皇不忍去故作此詩賦也𣉠之水荊子討申侯弒幽王之罪伐申侵甫及許平王遣兵戍之周人怨思而作興也君子于役戍申者之妻所作賦也葛藟王族流散而作興也子䘳王室下衰學政廢弛弟子多倍其師君子傷之而作是詩賦也何草不黃桓王之世伐藤薛唐杞諸國連歲不息周人苦之而作是詩前二章興也三章賦也末興也嶄嶄之石桓王伐鄭將帥不堪勞苦而作是詩賦也采菉周人從征其妻念之而作是詩賦也大車周人從軍寓其室家之詩賦也何彼穠矣齊襄公殺魯桓公莊王將平之使榮叔錫桓公命因使莊公主昏以桓王之妹嫁襄公周人傷之而作是詩一章賦中有比也二章賦也三章興也唐棣僖王者棄賢而諷之首章興也二章三章賦也采葛賢者被讒見黜于野周人閔之而作興也無將大車周大夫有親信小人者其臣諫之而作是詩比而後賦也君子陽陽景王好音而士遂習音君子諷之而作是詩賦也黃鳥民適異國見拒于人而思歸故鄉乃作是詩比而後賦也苕之華景王崩王室亂兵連歲饉民物盡耗君子自傷生逢其難而作是詩二章興也末章賦也中谷民飢而流夫婦不保君子閔之而作是詩興也有兔趙鞅殺萇弘周人傷之而作是詩比而賦也
